<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-users"></i> مجتمعنا
            </div>
            </div>
    </nav>

    <div class="main-container">
        
        <div class="right-col-placeholder" id="rightSidebarContainer">
            <div class="right-col" id="rightSidebar">
                
                <a id="rsProfileLink" href="#" style="text-decoration: none; display: block;">
                    <div class="rs-user-card">
                        <img id="rsUserPic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="rs-user-pic" alt="الصورة الشخصية">
                        <div>
                            <div id="rsUserName" class="rs-user-name">مرحباً بك</div>
                            <div id="rsUserHandle" class="rs-user-handle">@username</div>
                        </div>
                    </div>
                </a>

                <div class="sidebar-section">
                    <h3><i class="fas fa-bullhorn"></i> القنوات والمجتمعات</h3>
                    <div id="rightSidebarChannels">
                        </div>
                </div>

                <div class="rs-links">
                    <a class="rs-link-item" onclick="window.openCommunitiesModal()">
                        <i class="fas fa-users-cog"></i> <span>إدارة المجتمعات</span>
                    </a>
                    <a class="rs-link-item" href="#reels">
                        <i class="fas fa-film"></i> <span>الريلز الفيديوهات</span>
                    </a>
                </div>

            </div>
        </div>

        <div class="feed-area">
            
            <div onclick="window.showNewPosts()" class="new-posts-btn" id="newPostsBtn" style="display:none;">
                عرض المنشورات الجديدة ⬆️
            </div>

            <div class="composer-card">
                <textarea id="postInput" class="composer-input" placeholder="ماذا يدور في ذهنك اليوم؟" rows="3"></textarea>
                <div class="composer-actions">
                    <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-image"></i> صورة / فيديو
                    </button>
                    <input type="file" id="fileInput" style="display:none;" accept="image/*,video/*">
                    <button id="publishBtn" class="btn-primary" onclick="window.publishPost()">
                        <i class="fas fa-paper-plane"></i> نشر
                    </button>
                </div>
            </div>

            <div id="postsContainer">
                </div>

        </div>
        
        <div class="sidebar-placeholder" id="sidebarAreaContainer">
            <div id="sidebarArea" class="sidebar">
                
                <div class="sidebar-section">
                    <h3><i class="fas fa-user-plus"></i> مقترحون لك</h3>
                    <div id="suggestionsContainer">
                        </div>
                </div>

                <div class="sidebar-section">
                    <h3><i class="fas fa-comments"></i> المحادثات والدردشة</h3>
                    <div id="recentChatsContainer">
                        </div>
                </div>

            </div>
        </div>

    </div> <div class="modal" id="reelsViewerModal">
        <div class="modal-content">
            <span onclick="window.closeReelsViewer()" class="close-reel-btn"><i class="fas fa-times"></i></span>
            <div class="reels-scroll-area" id="reelsScrollArea">
                </div>
        </div>
    </div>

    <div class="modal" id="interestsModal">
        <div class="modal-content">
            <h2>اختر اهتماماتك لتخصيص تجربتك</h2>
            <div class="interests-grid" id="interestsGrid"></div>
            <button class="btn-primary" onclick="window.saveInterests()">حفظ والوصول للمنصة</button>
        </div>
    </div>

    <div class="modal" id="communitiesModal">
        <div class="modal-content">
            <span onclick="document.getElementById('communitiesModal').classList.remove('show')" class="close-btn">&times;</span>
            <h2>المجتمعات المتاحة</h2>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="communityNameInput" placeholder="اسم المجتمع الجديد..." style="flex:1; padding:8px; border-radius:6px; border:1px solid var(--border-color);">
                <input type="text" id="communityDescInput" placeholder="وصف قصير..." style="flex:1; padding:8px; border-radius:6px; border:1px solid var(--border-color);">
                <button id="createCommunityBtn" class="btn-primary" onclick="window.createCommunity()">إنشاء</button>
            </div>
            <div id="communitiesListContainer"></div>
        </div>
    </div>

    <div class="modal" id="communityViewModal">
        <div class="modal-content" style="max-width:700px; height:80vh; display:flex; flex-direction:column;">
            <span onclick="document.getElementById('communityViewModal').classList.remove('show'); document.body.style.overflow='auto';" class="close-btn">&times;</span>
            <div id="communityViewHeader" style="text-align:center; padding:15px; border-bottom:1px solid var(--border-color);">
                <h2 id="communityViewName">اسم المجتمع</h2>
                <p id="communityViewDesc" style="color:var(--text-muted);"></p>
                <div id="communityHeaderActions" style="display:flex; justify-content:center; gap:10px; margin-bottom:15px;"></div>
                
                <button class="btn-primary" style="background:#10b981; font-size:16px; padding:12px 30px; box-shadow:0 4px 15px rgba(16,185,129,0.4);" onclick="window.startCommunityCall()">
                    <i class="fas fa-video"></i> بدء اجتماع فيديو/صوت 
                </button>
            </div>

            <div style="flex:1; overflow-y:auto; padding:15px; background:#f8fafc;">
                <div style="background:#fff; padding:15px; border-radius:12px; border:1px solid var(--border-color); margin-bottom:20px;">
                    <textarea id="communityPostContent" class="composer-input" placeholder="شارك نقاشاً أو ملفاً مع أعضاء المجتمع..." rows="2" style="width:100%; background:#f8fafc; padding:10px; border-radius:8px; border:1px solid #e2e8f0;"></textarea>
                    <div style="text-align:left; margin-top:10px;">
                        <button id="publishCommBtn" class="btn-primary" onclick="window.publishCommunityPost()"><i class="fas fa-paper-plane"></i> نشر</button>
                    </div>
                </div>
                <div id="communityPostsContainer"></div>
            </div>
        </div>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <img id="chatHeaderAvatar" src="" class="nav-avatar" alt="avatar">
                <span id="chatTargetName" style="font-weight:700;">المستخدم</span>
            </div>
            <span onclick="document.getElementById('chatBox').classList.remove('show')" style="cursor:pointer;"><i class="fas fa-times"></i></span>
        </div>
        <div class="chat-messages" id="chatMessages">
            </div>
        <div class="chat-footer">
            <input type="text" id="chatInput" placeholder="اكتب رسالتك هنا..." oninput="window.handleChatInput()">
            <button onclick="window.sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>


    <script src="Dialog.js"></script>
    <script type="module" src="app.js"></script>

</body>
